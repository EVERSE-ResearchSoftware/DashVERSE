<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DashVERSE Demo{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <a href="/">DashVERSE</a>
            </div>
            <ul class="nav-links">
                {% for slug, dash in dashboards.items() %}
                <li><a href="/dashboard/{{ slug }}">{{ dash.title }}</a></li>
                {% endfor %}
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <p>
                <strong>DashVERSE</strong> is being developed as part of the
                <a href="https://everse.software" target="_blank">EVERSE</a> project.
            </p>
        </div>
    </footer>
</body>
</html>
