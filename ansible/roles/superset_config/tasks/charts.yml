---
- name: Get existing charts
  uri:
    url: "{{ superset_api }}/chart/?q=(page_size:100)"
    method: GET
    headers:
      Cookie: "{{ session_cookie }}"
    status_code: 200
  register: existing_charts

# ============================================================
# Policy Maker Dashboard Charts (10 charts)
# ============================================================

- name: "PM01: Total Software Projects"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Total Software Projects"
      description: "Total number of software projects registered in the system for quality assessment."
      datasource_id: "{{ dataset_ids['software'] }}"
      datasource_type: "table"
      viz_type: "big_number_total"
      params: |
        {
          "metric": {"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"},
          "header_font_size": 0.4,
          "subheader_font_size": 0.15,
          "subheader": "Software Projects Registered"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Total Software Projects') | list | length == 0

- name: "PM02: Total Assessments"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Total Assessments"
      datasource_id: "{{ dataset_ids['assessment_detailed'] }}"
      datasource_type: "table"
      viz_type: "big_number_total"
      params: |
        {
          "metric": {"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"},
          "header_font_size": 0.4,
          "subheader_font_size": 0.15,
          "subheader": "Assessments Completed"
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Total Assessments') | list | length == 0

- name: "PM03: Assessment Activity Over Time"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Assessment Activity Over Time"
      datasource_id: "{{ dataset_ids['assessment_trends'] }}"
      datasource_type: "table"
      viz_type: "echarts_timeseries_line"
      params: |
        {
          "x_axis": "month",
          "metrics": [{"label": "assessments", "expressionType": "SIMPLE", "column": {"column_name": "assessments"}, "aggregate": "SUM"}],
          "color_scheme": "supersetColors",
          "show_legend": true,
          "rich_tooltip": true
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Assessment Activity Over Time') | list | length == 0

- name: "PM04: Quality by Software"
  uri:
    url: "{{ superset_api }}/chart/"
    method: POST
    headers:
      Cookie: "{{ session_cookie }}"
      X-CSRFToken: "{{ csrf_token }}"
      Content-Type: application/json
    body_format: json
    body:
      slice_name: "Quality by Software"
      datasource_id: "{{ dataset_ids['checks_detailed'] }}"
      datasource_type: "table"
      viz_type: "dist_bar"
      params: |
        {
          "groupby": ["software_name"],
          "metrics": [{"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"}],
          "color_scheme": "supersetColors",
          "row_limit": 20,
          "show_legend": false
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Quality by Software') | list | length == 0

- name: "PM05: Compliance Heatmap"
