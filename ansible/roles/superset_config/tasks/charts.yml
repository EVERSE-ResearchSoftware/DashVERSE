          "metric": {"label": "total_checks", "expressionType": "SIMPLE", "column": {"column_name": "total_checks"}, "aggregate": "SUM"},
          "color_scheme": "supersetColors",
          "show_labels": true,
          "show_legend": true,
          "donut": true,
          "innerRadius": 40
        }
