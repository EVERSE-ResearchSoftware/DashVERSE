    body:
      slice_name: "Compliance Heatmap"
      datasource_id: "{{ dataset_ids['checks_detailed'] }}"
      datasource_type: "table"
      viz_type: "heatmap"
      params: |
        {
          "all_columns_x": "dimension_name",
          "all_columns_y": "software_name",
          "metric": {"label": "count", "expressionType": "SQL", "sqlExpression": "COUNT(*)"},
          "linear_color_scheme": "greenOrange",
          "show_values": false
        }
    status_code: [200, 201]
  when: existing_charts.json.result | selectattr('slice_name', 'equalto', 'Compliance Heatmap') | list | length == 0

